name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        run: |
          echo "Calling Vercel deploy hook..."
          # Print the project ID portion of the URL (safe to log)
          echo "Hook host: $(echo "$VERCEL_DEPLOY_HOOK" | sed -E 's|https://([^/]+).*|\1|')"
          echo "Hook path tail: $(echo "$VERCEL_DEPLOY_HOOK" | sed -E 's|.*/deploy/([^/?]+).*|\1|')"
          response=$(curl -fsSL -X POST "$VERCEL_DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"${{ github.sha }}\"}")
          echo "Vercel response: $response"
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
