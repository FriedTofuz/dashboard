name: Auto-tag and release on main

# Read package.json on every push to main and create a matching `vX.Y.Z` tag
# (and a draft GitHub Release) if one doesn't already exist yet.
#
# Convention: bump package.json in the same PR that merges to main. The
# workflow turns that version into both a git tag and a Release page so they
# stay in lockstep with the user's feature drops.
#
# - "2.4.0" → tag + release "v2.4.0"  (kept verbatim now; the earlier ".0
#   stripping" logic was removed in v2.4.0 so the spec's drop labels and the
#   tags line up character-for-character)
# - "2.4.1" → tag + release "v2.4.1"
# - A re-push of an existing version is a no-op.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check whether tag already exists
        id: check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" \
            -m "Release ${{ steps.version.outputs.tag }} (package.json ${{ steps.version.outputs.version }})"
          git push origin "${{ steps.version.outputs.tag }}"

      # Auto-create a GitHub Release pointing at the new tag with autogenerated
      # release notes (the commits between this tag and the previous one).
      # Releases live alongside tags but show up on the repo's Releases page
      # with a discoverable URL, which is what the spec asks for.
      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
