<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sunflower Dashboard — Wireframes</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- handwriting + printing fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Kalam:wght@300;400;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="paper.css" />

<style>
  html, body {
    margin: 0; padding: 0;
    font-family: 'Caveat', cursive;
    background: #ecdfc8;
    color: #2B2622;
  }
  /* canvas background = warm tan so paper artboards float */
  [data-dc-canvas-bg] { background: #d9c9aa; }
</style>

<!-- React + Babel for the design canvas -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

<body>

<!-- ===========================================================
     Global SVG defs: wobble filter (hand-drawn) + blob (watercolor)
     =========================================================== -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <filter id="wobble">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="1.6"/>
    </filter>
    <filter id="wobble-strong">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="2.6"/>
    </filter>
    <filter id="blob" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.2"/>
    </filter>
  </defs>
</svg>

<!-- ===========================================================
     Design canvas root
     =========================================================== -->
<div id="root"></div>

<!-- Load support scripts FIRST so window.SCREENS / window.DesignCanvas exist by the time App mounts -->
<script src="screens-parts.js"></script>
<script src="screens.js"></script>
<script src="sunflower.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel" data-presets="env,react">
  const { useEffect, useRef } = React;

  function App() {
    const DesignCanvas = window.DesignCanvas;
    const DCSection   = window.DCSection;
    const DCArtboard  = window.DCArtboard;
    // hydrate any sunflower placeholders inside artboards (in case they re-render)
    useEffect(() => {
      const ev = new Event('DOMContentLoaded');
      // sunflower.js auto-hydrates on load — call its hook again after canvas mounts
      if (window.renderSunflower) {
        document.querySelectorAll('[data-sunflower]').forEach(el => {
          window.renderSunflower(el, el.getAttribute('data-sunflower'));
        });
      }
    }, []);

    return (
      <DesignCanvas title="Sunflower · personal dashboard — v1" subtitle="handdrawn notepaper · for implementation handoff">

        {/* ===================== 1. DESKTOP ===================== */}
        <DCSection id="desktop" title="01 · Desktop one-page dashboard">
          <DCArtboard id="desktop-main" label="Today — full desktop layout" width={1400} height={940}>
            <div className="paper" style={{ width: '100%', height: '100%' }} dangerouslySetInnerHTML={{ __html: window.SCREENS.desktop }} />
          </DCArtboard>
        </DCSection>

        {/* ===================== 2. TASK STATES ===================== */}
        <DCSection id="task" title="02 · A single task — three states">
          <DCArtboard id="task-open" label="Open" width={420} height={120}>
            <div className="paper" style={{ width:'100%', height:'100%' }} dangerouslySetInnerHTML={{ __html: window.SCREENS.taskOpen }}/>
          </DCArtboard>
          <DCArtboard id="task-timer" label="Timer running" width={420} height={120}>
            <div className="paper" style={{ width:'100%', height:'100%' }} dangerouslySetInnerHTML={{ __html: window.SCREENS.taskTimer }}/>
          </DCArtboard>
          <DCArtboard id="task-done" label="Completed — ink strikethrough" width={420} height={120}>
            <div className="paper" style={{ width:'100%', height:'100%' }} dangerouslySetInnerHTML={{ __html: window.SCREENS.taskDone }}/>
          </DCArtboard>
        </DCSection>

        {/* ===================== 3. RULE OF 3 ===================== */}
        <DCSection id="rule3" title="03 · The Rule of 3 row">
          <DCArtboard id="rule3-empty" label="Empty — ghost placeholders" width={1080} height={260}>
            <div className="paper" style={{ width:'100%', height:'100%' }} dangerouslySetInnerHTML={{ __html: window.SCREENS.rule3Empty }}/>
          </DCArtboard>
          <DCArtboard id="rule3-filled" label="Filled" width={1080} height={260}>
            <div className="paper" style={{ width:'100%', height:'100%' }} dangerouslySetInnerHTML={{ __html: window.SCREENS.rule3Filled }}/>
          </DCArtboard>
        </DCSection>

        {/* ===================== 4. SUNFLOWER STATES ===================== */}
        <DCSection id="flower" title="04 · Sunflower — four health states">
          <DCArtboard id="flower-thriving" label="Thriving — Rule of 3 done + bonus" width={300} height={460}>
            <div className="paper" style={{ width:'100%', height:'100%' }} dangerouslySetInnerHTML={{ __html: window.SCREENS.flower('thriving','thriving','all 3 done +') }}/>
          </DCArtboard>
          <DCArtboard id="flower-healthy" label="Healthy — on pace" width={300} height={460}>
            <div className="paper" style={{ width:'100%', height:'100%' }} dangerouslySetInnerHTML={{ __html: window.SCREENS.flower('healthy','healthy','on pace today') }}/>
          </DCArtboard>
          <DCArtboard id="flower-drooping" label="Drooping — falling behind" width={300} height={460}>
            <div className="paper" style={{ width:'100%', height:'100%' }} dangerouslySetInnerHTML={{ __html: window.SCREENS.flower('drooping','drooping','behind — water me') }}/>
          </DCArtboard>
          <DCArtboard id="flower-wilting" label="Wilting — neglected" width={300} height={460}>
            <div className="paper" style={{ width:'100%', height:'100%' }} dangerouslySetInnerHTML={{ __html: window.SCREENS.flower('wilting','wilting','3 days unattended') }}/>
          </DCArtboard>
        </DCSection>

        {/* ===================== 5. DATE RANGE ===================== */}
        <DCSection id="range" title="05 · Date-range view — 5 days side-by-side">
          <DCArtboard id="range-5day" label="Mon → Fri" width={1400} height={820}>
            <div className="paper" style={{ width:'100%', height:'100%' }} dangerouslySetInnerHTML={{ __html: window.SCREENS.range }}/>
          </DCArtboard>
        </DCSection>

        {/* ===================== 6. MOBILE PWA ===================== */}
        <DCSection id="mobile" title="06 · Mobile PWA — tabs">
          <DCArtboard id="m-home" label="Today" width={390} height={780}>
            <div className="paper" style={{ width:'100%', height:'100%' }} dangerouslySetInnerHTML={{ __html: window.SCREENS.mHome }}/>
          </DCArtboard>
          <DCArtboard id="m-range" label="Range" width={390} height={780}>
            <div className="paper" style={{ width:'100%', height:'100%' }} dangerouslySetInnerHTML={{ __html: window.SCREENS.mRange }}/>
          </DCArtboard>
          <DCArtboard id="m-notepad" label="Notepad" width={390} height={780}>
            <div className="paper" style={{ width:'100%', height:'100%' }} dangerouslySetInnerHTML={{ __html: window.SCREENS.mNotepad }}/>
          </DCArtboard>
          <DCArtboard id="m-stats" label="Stats" width={390} height={780}>
            <div className="paper" style={{ width:'100%', height:'100%' }} dangerouslySetInnerHTML={{ __html: window.SCREENS.mStats }}/>
          </DCArtboard>
          <DCArtboard id="m-archive" label="Archive" width={390} height={780}>
            <div className="paper" style={{ width:'100%', height:'100%' }} dangerouslySetInnerHTML={{ __html: window.SCREENS.mArchive }}/>
          </DCArtboard>
        </DCSection>

      </DesignCanvas>
    );
  }

  // Wait for SCREENS + DesignCanvas to be defined (babel-standalone runs all
  // text/babel scripts in document order, but external src ones are async-fetched
  // so we still poll to be safe)
  function mount() {
    if (!window.SCREENS || !window.DesignCanvas) { setTimeout(mount, 30); return; }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    // hydrate sunflowers after first render
    setTimeout(() => {
      document.querySelectorAll('[data-sunflower]').forEach(el => {
        const s = el.getAttribute('data-sunflower');
        if (window.renderSunflower) window.renderSunflower(el, s);
      });
    }, 80);
  }
  mount();
</script>

</body>
</html>
